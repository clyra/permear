# =============================================================================
# PERMEAR — Persistent Memory Automations
#
# BEFORE USING: Replace all placeholders:
#   YOUR_CHAT_ID   → Your Telegram chat_id (integer)
#   YOUR_AGENT_ID  → Your conversation agent entity_id
#                    (e.g., conversation.google_generative_ai)
#
# CUSTOMIZE: Sensor entity_ids in permear_buffer_events and
#            permear_prebriefing must match YOUR actual devices.
# =============================================================================

# -----------------------------------------------------------------------------
# 1. EVENT BUFFER — Collects house events throughout the day
# -----------------------------------------------------------------------------
- alias: "PERMEAR - Buffer events"
  id: permear_buffer_events
  mode: queued
  max: 20
  trigger:
    # === CUSTOMIZE THESE TRIGGERS FOR YOUR DEVICES ===
    - platform: state
      entity_id: person.YOUR_PERSON
      to: "home"
      id: "user_arrived"
    - platform: state
      entity_id: person.YOUR_PERSON
      from: "home"
      id: "user_left"
    # Add your own sensor triggers below. Examples:
    # - platform: numeric_state
    #   entity_id: sensor.YOUR_TEMPERATURE_SENSOR
    #   above: 28
    #   id: "hot_room"
    # - platform: state
    #   entity_id: binary_sensor.YOUR_WINDOW_SENSOR
    #   to: "on"
    #   for: "00:05:00"
    #   id: "window_open_5min"
    # - platform: state
    #   entity_id: climate.YOUR_AC
    #   to: "cool"
    #   id: "ac_turned_on"
  action:
    - service: shell_command.append_daily_event
      data:
        detail: "{{ trigger.id }}"

# -----------------------------------------------------------------------------
# 2. TELEGRAM HANDLER — Bidirectional chat via LLM
# -----------------------------------------------------------------------------
- alias: "PERMEAR - Telegram handler"
  id: permear_telegram_handler
  mode: queued
  max: 5
  trigger:
    - platform: event
      event_type: telegram_text
  condition:
    - condition: template
      value_template: "{{ trigger.event.data.chat_id == YOUR_CHAT_ID }}"
  action:
    # Log the interaction
    - service: shell_command.append_daily_interaction
      data:
        detail: "telegram:{{ trigger.event.data.text[:100] }}"
    # Process via LLM
    - service: conversation.process
      data:
        agent_id: YOUR_AGENT_ID
        text: "{{ trigger.event.data.text }}"
        conversation_id: "telegram_main"
      response_variable: response
    # Reply on Telegram
    - service: telegram_bot.send_message
      data:
        chat_id: YOUR_CHAT_ID
        message: "{{ response.response.speech.plain.speech }}"

# -----------------------------------------------------------------------------
# 3. DAILY BRIEFING — Intelligent summary at 21h via Telegram
# -----------------------------------------------------------------------------
- alias: "PERMEAR - Daily briefing"
  id: permear_daily_briefing
  trigger:
    - platform: time
      at: "21:00:00"
  action:
    # 1. Build prompt
    - service: shell_command.build_briefing_prompt
      response_variable: prompt_result
    # 2. Send to LLM
    - service: conversation.process
      data:
        agent_id: YOUR_AGENT_ID
        text: "{{ prompt_result.stdout }}"
      response_variable: briefing
    # 3. Send via Telegram
    - service: telegram_bot.send_message
      data:
        chat_id: YOUR_CHAT_ID
        message: "{{ briefing.response.speech.plain.speech }}"
    # 4. Extract memories from today
    - delay:
        seconds: 5
    - service: conversation.process
      data:
        agent_id: YOUR_AGENT_ID
        text: >
          Analyze today's events and interactions and extract relevant memories.
          Return ONLY JSON: {"daily_memories": ["memory 1", "memory 2"]}
          If nothing relevant, return: {"daily_memories": []}
          Events: {{ state_attr('sensor.current_day_memory', 'events') }}
          Interactions: {{ state_attr('sensor.current_day_memory', 'interactions') }}
      response_variable: memories
    # 5. Save memories
    - service: shell_command.update_daily_memory
      data:
        response: "{{ memories.response.speech.plain.speech }}"
    # 6. Flag
    - service: shell_command.append_daily_flag
      data:
        detail: "briefing_sent"

# -----------------------------------------------------------------------------
# 4. PRE-BRIEFING — Proactive house evaluation every 30 minutes
# -----------------------------------------------------------------------------
- alias: "PERMEAR - Pre-briefing"
  id: permear_prebriefing
  trigger:
    - platform: time_pattern
      minutes: "/30"
  condition:
    - condition: time
      after: "08:00:00"
      before: "20:00:00"
  action:
    # 1. Build house state as compact text
    # === CUSTOMIZE THESE SENSOR REFERENCES ===
    - variables:
        house_state: >
          Time: {{ now().strftime('%H:%M') }}.
          User: {{ states('person.YOUR_PERSON') }}.
          Weather: {{ states('weather.forecast_home') }}, {{ state_attr('weather.forecast_home', 'temperature') }} degrees.
    # 2. Build prompt
    - service: shell_command.build_prebriefing_prompt
      data:
        state: "{{ house_state }}"
      response_variable: prompt_result
    # 3. Send to LLM
    - service: conversation.process
      data:
        agent_id: YOUR_AGENT_ID
        text: "{{ prompt_result.stdout }}"
      response_variable: evaluation
    # 4. Decide: send or silence
    - variables:
        answer: "{{ evaluation.response.speech.plain.speech | trim }}"
    - condition: template
      value_template: >
        {{ 'SILENCE' not in answer.upper() and answer | length > 2 }}
    # 5. Send via Telegram
    - service: telegram_bot.send_message
      data:
        chat_id: YOUR_CHAT_ID
        message: "{{ answer }}"
    # 6. Log as agent interaction
    - service: shell_command.append_daily_interaction
      data:
        detail: "prebriefing:{{ answer[:100] }}"

# -----------------------------------------------------------------------------
# 5. QUICK LEARNING — Learn from user rejection of pre-briefing alerts
# -----------------------------------------------------------------------------
- alias: "PERMEAR - Quick learning"
  id: permear_quick_learning
  trigger:
    - platform: event
      event_type: telegram_text
  condition:
    - condition: template
      value_template: >
        {% set text = trigger.event.data.text | lower %}
        {{ trigger.event.data.chat_id == YOUR_CHAT_ID and
           ('irrelevant' in text or
            'unnecessary' in text or
            'already know' in text or
            'stop alerting' in text or
            'dont alert' in text or
            "don't alert" in text or
            'not important' in text or
            'dont care' in text or
            "don't care" in text or
            'stop telling' in text or
            'i know' in text) }}
  action:
    - service: conversation.process
      data:
        agent_id: YOUR_AGENT_ID
        text: >
          The user responded to one of your alerts with: "{{ trigger.event.data.text }}"
          This indicates the alert was irrelevant or unwanted.
          
          Analyze the response and return ONLY JSON:
          {"new_restriction": "short description of what NOT to alert about"}
          
          If you cannot extract a clear restriction, return: {"new_restriction": null}
      response_variable: learning
    - service: shell_command.apply_quick_learning
      data:
        response: "{{ learning.response.speech.plain.speech }}"

# -----------------------------------------------------------------------------
# 6. WEEKLY COMPILATION — Self-improvement cycle (Sunday 00:05)
# -----------------------------------------------------------------------------
- alias: "PERMEAR - Weekly compilation"
  id: permear_weekly_compile
  trigger:
    - platform: time
      at: "00:05:00"
  condition:
    - condition: time
      weekday: [sun]
  action:
    # 1. Build weekly prompt
    - service: shell_command.build_weekly_prompt
      response_variable: weekly_prompt
    # 2. Send to LLM
    - service: conversation.process
      data:
        agent_id: YOUR_AGENT_ID
        text: "{{ weekly_prompt.stdout }}"
      response_variable: compilation
    # 3. Apply edits
    - service: shell_command.weekly_compile
      data:
        response: "{{ compilation.response.speech.plain.speech }}"
      response_variable: compile_result
    # 4. Notify result
    - service: telegram_bot.send_message
      data:
        chat_id: YOUR_CHAT_ID
        message: "Weekly compilation complete. {{ compile_result.stdout }}"

# -----------------------------------------------------------------------------
# 7. DAILY RESET — Midnight event
# -----------------------------------------------------------------------------
- alias: "PERMEAR - Daily reset"
  id: permear_daily_reset
  trigger:
    - platform: time
      at: "00:00:00"
  action:
    - event: permear_day_reset
