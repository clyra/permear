# =============================================================================
# PERMEAR v5.4 — Persistent Memory + System Caretaker Automations
#
# Replace: YOUR_CHAT_ID, YOUR_AGENT_ID, person.YOUR_PERSON
# =============================================================================

# 1. EVENT BUFFER
- alias: "PERMEAR - Buffer events"
  id: permear_buffer_events
  mode: queued
  max: 20
  trigger:
    # [BEGIN buffer_events triggers — generated]
    - platform: state
      entity_id: person.YOUR_PERSON
      to: "home"
      id: "user_arrived"
    - platform: state
      entity_id: person.YOUR_PERSON
      from: "home"
      id: "user_left"
    # [END buffer_events triggers — generated]
  action:
    - service: shell_command.append_daily_event
      data:
        detail: "{{ trigger.id }}"

# 2. TELEGRAM HANDLER
- alias: "PERMEAR - Telegram handler"
  id: permear_telegram_handler
  mode: queued
  max: 5
  trigger:
    - platform: event
      event_type: telegram_text
  condition:
    - condition: template
      value_template: "{{ trigger.event.data.chat_id == YOUR_CHAT_ID }}"
  action:
    - service: shell_command.append_daily_interaction
      data:
        detail: "telegram:{{ trigger.event.data.text[:100] }}"
    - service: conversation.process
      data:
        agent_id: YOUR_AGENT_ID
        text: >
          {% set last_msg = states('input_text.permear_last_agent_message') %}
          {% if last_msg and last_msg not in ['unknown', 'unavailable', ''] %}
          [Context: your last message to the user was: "{{ last_msg }}"]
          {% endif %}
          {{ trigger.event.data.text }}
        conversation_id: "telegram_main"
      response_variable: response
    - variables:
        speech: "{{ response.response.speech.plain.speech | default('') | trim }}"
    - if:
        - condition: template
          value_template: "{{ speech | length > 0 }}"
      then:
        - service: telegram_bot.send_message
          data:
            chat_id: YOUR_CHAT_ID
            message: "{{ speech }}"
        - service: input_text.set_value
          target:
            entity_id: input_text.permear_last_agent_message
          data:
            value: "{{ speech | truncate(255, False, '') }}"
      else:
        - service: telegram_bot.send_message
          data:
            chat_id: YOUR_CHAT_ID
            message: "Sorry, I got an empty response. Could you repeat?"

# 3. DAILY BRIEFING (21h)
- alias: "PERMEAR - Daily briefing"
  id: permear_daily_briefing
  trigger:
    - platform: time
      at: "21:00:00"
  action:
    - service: shell_command.ha_updates_check
      response_variable: updates_result
    - service: shell_command.build_briefing_prompt
      data:
        updates: "{{ updates_result.stdout | default('') }}"
      response_variable: prompt_result
    - service: conversation.process
      data:
        agent_id: YOUR_AGENT_ID
        text: "{{ prompt_result.stdout }}"
      response_variable: briefing
    - variables:
        speech: "{{ briefing.response.speech.plain.speech | default('') | trim }}"
    - if:
        - condition: template
          value_template: "{{ speech | length > 0 }}"
      then:
        - service: telegram_bot.send_message
          data:
            chat_id: YOUR_CHAT_ID
            message: "{{ speech }}"
        - service: input_text.set_value
          target:
            entity_id: input_text.permear_last_agent_message
          data:
            value: "{{ speech | truncate(255, False, '') }}"
    - delay:
        seconds: 5
    - service: conversation.process
      data:
        agent_id: YOUR_AGENT_ID
        text: >
          Analyze today's events and interactions and extract relevant memories.
          Return ONLY JSON: {"daily_memories": ["memory 1", "memory 2"]}
          If nothing relevant: {"daily_memories": []}
          Events: {{ state_attr('sensor.current_day_memory', 'events') }}
          Interactions: {{ state_attr('sensor.current_day_memory', 'interactions') }}
      response_variable: memories
    - service: shell_command.update_daily_memory
      data:
        response: "{{ memories.response.speech.plain.speech }}"
    - service: shell_command.append_daily_flag
      data:
        detail: "briefing_sent"

# 4. PRE-BRIEFING (every 30min) with HA health monitoring
- alias: "PERMEAR - Pre-briefing"
  id: permear_prebriefing
  trigger:
    - platform: time_pattern
      minutes: "/30"
  condition:
    - condition: time
      after: "08:00:00"
      before: "20:00:00"
  action:
    - service: shell_command.ha_log_monitor
      response_variable: health_result
    - service: shell_command.build_prebriefing_prompt
      data:
        health: "{{ health_result.stdout | default('HEALTH: OK') }}"
      response_variable: prompt_result
    - service: conversation.process
      data:
        agent_id: YOUR_AGENT_ID
        text: "{{ prompt_result.stdout }}"
      response_variable: evaluation
    - variables:
        answer: "{{ evaluation.response.speech.plain.speech | default('') | trim }}"
    - condition: template
      value_template: >
        {{ 'SILENCE' not in answer.upper() and answer | length > 2 }}
    - service: telegram_bot.send_message
      data:
        chat_id: YOUR_CHAT_ID
        message: "{{ answer }}"
    - service: input_text.set_value
      target:
        entity_id: input_text.permear_last_agent_message
      data:
        value: "{{ answer | truncate(255, False, '') }}"
    - service: shell_command.append_daily_interaction
      data:
        detail: "prebriefing:{{ answer[:100] }}"

# 5. QUICK LEARNING — keywords must match user's language
- alias: "PERMEAR - Quick learning"
  id: permear_quick_learning
  trigger:
    - platform: event
      event_type: telegram_text
  condition:
    - condition: template
      value_template: >
        {% set text = trigger.event.data.text | lower %}
        {{ trigger.event.data.chat_id == YOUR_CHAT_ID and
           ('irrelevant' in text or 'unnecessary' in text or
            'already know' in text or 'stop alerting' in text or
            "don't alert" in text or 'not important' in text or
            "don't care" in text or 'stop telling' in text or
            'i know' in text) }}
  action:
    - service: conversation.process
      data:
        agent_id: YOUR_AGENT_ID
        text: >
          The user responded to an alert with: "{{ trigger.event.data.text }}"
          Return ONLY JSON: {"new_restriction": "what NOT to alert about"}
          If unclear: {"new_restriction": null}
      response_variable: learning
    - service: shell_command.apply_quick_learning
      data:
        response: "{{ learning.response.speech.plain.speech }}"

# 6. ENTITY DISCOVERY (daily 06:00)
- alias: "PERMEAR - Entity discovery"
  id: permear_entity_discovery
  trigger:
    - platform: time
      at: "06:00:00"
  action:
    - service: shell_command.discover_entities

# 7. WEEKLY COMPILATION (Sunday 00:05)
- alias: "PERMEAR - Weekly compilation"
  id: permear_weekly_compile
  trigger:
    - platform: time
      at: "00:05:00"
  condition:
    - condition: time
      weekday: [sun]
  action:
    - service: shell_command.build_weekly_prompt
      response_variable: weekly_prompt
    - service: conversation.process
      data:
        agent_id: YOUR_AGENT_ID
        text: "{{ weekly_prompt.stdout }}"
      response_variable: compilation
    - service: shell_command.weekly_compile
      data:
        response: "{{ compilation.response.speech.plain.speech }}"
      response_variable: compile_result
    - service: telegram_bot.send_message
      data:
        chat_id: YOUR_CHAT_ID
        message: "Weekly compilation complete. {{ compile_result.stdout }}"

# 8. DAILY RESET
- alias: "PERMEAR - Daily reset"
  id: permear_daily_reset
  trigger:
    - platform: time
      at: "00:00:00"
  action:
    - event: permear_day_reset
